services:
  - type: web
    name: vehicle-insurance-web
    runtime: python
    plan: free
    buildCommand: |
      pip install --upgrade pip setuptools wheel
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
    startCommand: python manage.py migrate --noinput && python manage.py seed_demo_accounts && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 3 --timeout 120 --max-requests 1000 --max-requests-jitter 100
    autoDeployTrigger: commit
    healthCheckPath: /health
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: vehicle-insurance-web.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://vehicle-insurance-web.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: vehicle-insurance-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: vehicle-insurance-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: vehicle-insurance-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: keyvalue
          name: vehicle-insurance-redis
          property: connectionString
      - key: CACHE_DEFAULT_URL
        fromService:
          type: keyvalue
          name: vehicle-insurance-redis
          property: connectionString
      - key: CACHE_SESSIONS_URL
        fromService:
          type: keyvalue
          name: vehicle-insurance-redis
          property: connectionString
      - key: CACHE_TENANT_URL
        fromService:
          type: keyvalue
          name: vehicle-insurance-redis
          property: connectionString
      - key: DEFAULT_FROM_EMAIL
        value: noreply@vehicle-insurance.com
      - key: BOOTSTRAP_DEMO_ACCOUNTS
        value: "true"
      - key: DEMO_PLATFORM_USERNAME
        value: admin
      - key: DEMO_PLATFORM_PASSWORD
        value: AdminDemo123!
      - key: DEMO_TENANT_USERNAME
        value: demo_admin
      - key: DEMO_TENANT_PASSWORD
        value: DemoAdmin123!

  - type: keyvalue
    name: vehicle-insurance-redis
    plan: free
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru

databases:
  - name: vehicle-insurance-db
    databaseName: vehicle_insurance
    user: vehicle_insurance_user
    plan: free
    ipAllowList: []
