name: Vehicle Insurance System CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '18'

jobs:
  # Code Quality and Security Checks
  quality-checks:
    runs-on: ubuntu-latest
    name: Code Quality & Security
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install bandit safety

    - name: Detect changed Python files
      id: changed-python
      run: |
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          BASE="${{ github.event.pull_request.base.sha }}"
        else
          BASE="${{ github.event.before }}"
        fi

        files=$(git diff --name-only --diff-filter=ACMR "$BASE" "${{ github.sha }}" -- '*.py' | tr '\n' ' ')
        app_files=$(printf "%s\n" $files | grep '^apps/' | tr '\n' ' ' || true)
        echo "files=$files" >> "$GITHUB_OUTPUT"
        echo "app_files=$app_files" >> "$GITHUB_OUTPUT"

        if [ -z "$files" ]; then
          echo "No changed Python files detected."
        else
          echo "Changed Python files: $files"
        fi

        if [ -n "$app_files" ]; then
          echo "Changed app Python files: $app_files"
        fi
    
    - name: Code formatting check (Black)
      if: steps.changed-python.outputs.files != ''
      run: black --check --diff ${{ steps.changed-python.outputs.files }}
    
    - name: Import sorting check (isort)
      if: steps.changed-python.outputs.files != ''
      run: isort --check-only --diff ${{ steps.changed-python.outputs.files }}
    
    - name: Linting (flake8)
      if: steps.changed-python.outputs.files != ''
      run: flake8 --select=E9,F63,F7,F82 ${{ steps.changed-python.outputs.files }}
    
    - name: Type checking (mypy)
      if: steps.changed-python.outputs.app_files != ''
      continue-on-error: true
      run: mypy ${{ steps.changed-python.outputs.app_files }} --ignore-missing-imports
    
    - name: Security check (Bandit)
      if: steps.changed-python.outputs.app_files != ''
      run: bandit ${{ steps.changed-python.outputs.app_files }} -f json -o bandit-report.json

    - name: Create empty Bandit report
      if: steps.changed-python.outputs.app_files == ''
      run: echo '{}' > bandit-report.json
    
    - name: Dependency vulnerability check (Safety)
      continue-on-error: true
      run: safety check --json > safety-report.json
    
    - name: Upload security reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-reports
        path: |
          bandit-report.json
          safety-report.json

  # Comprehensive Testing
  test:
    runs-on: ubuntu-latest
    name: Test Suite
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_vehicle_insurance
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install coverage pytest-xdist
    
    - name: Set up environment
      run: |
        cp .env.example .env
        echo "SECRET_KEY=test-secret-key-for-ci" >> .env
        echo "DEBUG=True" >> .env
        echo "DB_HOST=localhost" >> .env
        echo "DB_NAME=test_vehicle_insurance" >> .env
        echo "DB_USER=postgres" >> .env
        echo "DB_PASSWORD=postgres" >> .env
        echo "REDIS_URL=redis://localhost:6379/0" >> .env
    
    - name: Run migrations
      run: python manage.py migrate --settings=config.settings.development
    
    - name: Run tests with coverage
      run: |
        coverage run --source='.' manage.py test --settings=config.settings.development --parallel
        coverage xml
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  # Docker Build and Security Scan
  docker-build:
    runs-on: ubuntu-latest
    name: Docker Build & Security Scan
    needs: [quality-checks, test]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        load: true
        tags: vehicle-insurance:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
    
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'vehicle-insurance:${{ github.sha }}'
        format: 'sarif'
        output: 'trivy-results.sarif'
    
    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v3
      if: always() && hashFiles('trivy-results.sarif') != ''
      with:
        sarif_file: 'trivy-results.sarif'
